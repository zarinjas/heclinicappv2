name: Agentic AI Director

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action from Telegram bot'
        required: true
        type: string
        default: 'run'

concurrency:
  group: agent-director
  cancel-in-progress: false

jobs:
  director:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config --global user.name "heclinic-agent[bot]"
          git config --global user.email "agent@heclinic.cyberoket.cloud"
          git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/zarinjas/heclinicappv2.git

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Run Director
        run: opencode run "Read .github/scripts/director-prompt.md and execute exactly as instructed. Start now."
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VPS_BOT_URL: ${{ secrets.VPS_BOT_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TRIGGER_ACTION: ${{ github.event.inputs.action }}
