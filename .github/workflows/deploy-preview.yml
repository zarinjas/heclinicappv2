name: Deploy Flutter Web Preview

on:
  push:
    branches:
      - develop

concurrency:
  group: heclinic-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - name: Verify Flutter
        run: flutter --version

      # Fails the build if pub get cannot resolve dependencies.
      - name: Install dependencies
        run: flutter pub get

      # Reporting step only — never fails the build.
      #
      # This workspace is in active V2 development. The FlutterFlow-generated
      # baseline produces lint infos and warnings (e.g. prefer_const_constructors)
      # that are not yet actionable. Analyze output is visible in the step log
      # for awareness but does not block deployment.
      #
      # TODO: Remove `|| true` once the codebase has been cleaned up post-migration.
      - name: Analyze (reporting only — non-blocking)
        run: flutter analyze || true

      # Fails the build if any test exits non-zero.
      - name: Run tests
        run: |
          if [ -d test ] && [ "$(ls -A test 2>/dev/null)" ]; then
            flutter test
          else
            echo "No tests found — skipping."
          fi

      # Fails the build if the web release build does not compile successfully.
      - name: Build web
        run: flutter build web --release

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Clean remote directory
        run: >
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.PORT }}
          ${{ secrets.USERNAME }}@${{ secrets.HOST }}
          "rm -rf /var/www/heclinic/*"

      - name: Deploy via rsync
        run: >
          rsync -avz --delete
          -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.PORT }}"
          build/web/
          ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/heclinic/
