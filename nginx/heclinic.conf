# He Clinic VPS Nginx Configuration
#
# Place this file at: /etc/nginx/sites-available/heclinic
# Then symlink: ln -s /etc/nginx/sites-available/heclinic /etc/nginx/sites-enabled/
# Reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name heclinic.cyberoket.cloud;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heclinic.cyberoket.cloud;

    ssl_certificate     /etc/letsencrypt/live/heclinic.cyberoket.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heclinic.cyberoket.cloud/privkey.pem;

    root /var/www/heclinic;
    index index.html;

    # --- Flutter Web App (static files) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Laravel API (PHP-FPM) ---
    location /api/ {
        alias /var/www/heclinic-laravel/public/;
        try_files $uri $uri/ /api/index.php?$query_string;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/heclinic-laravel/public/index.php;
        }
    }

    # --- Telegram Bot Webhook ---
    location /bot/ {
        proxy_pass http://127.0.0.1:3000/bot/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
}
