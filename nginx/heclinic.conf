# He Clinic VPS Nginx Configuration
#
# Place this file at: /etc/nginx/sites-available/heclinic.cyberoket.cloud

server {
    listen 80;
    listen [::]:80;
    server_name heclinic.cyberoket.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heclinic.cyberoket.cloud;

    ssl_certificate /etc/letsencrypt/live/heclinic.cyberoket.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heclinic.cyberoket.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/heclinic;
    index index.html;

    # Laravel Admin Panel + API — combined PHP handler
    location ~ ^/(admin|api) {
        rewrite ^/(admin|api)(/.*|$) /index.php?$query_string last;
    }

    location ~ \.php$ {
        root /var/www/heclinic-laravel/public;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/heclinic-laravel/public/index.php;
        fastcgi_param LARAVEL_ENV production;
        include fastcgi_params;
    }

    # Flutter Web App (must be after specific locations)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Telegram Bot Webhook
    location /bot/ {
        proxy_pass http://127.0.0.1:3000/bot/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
}
